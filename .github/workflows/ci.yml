name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  terminology:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          # Exclude protocol-layer files where eBUS spec terminology is unavoidable
          if git grep -nIwiE 'm[a]ster|s[l]ave' -- \
              ':!protocol/slave_encode.go' \
              ':!protocol/bus.go' \
              ':!protocol/protocol.go' \
              ':!protocol/initiator_address_test.go' \
              ':!emulation/' \
              ':!transport/ebusd_tcp.go' \
              ':!README.md'; then
            echo "Found legacy terminology."
            exit 1
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go vet ./...
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test -race -count=1 ./...

  tinygo:                                    # ebusgo and ebusreg only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: acifani/setup-tinygo@v2
        with:
          tinygo-version: '0.40.1'
      - run: |
          mains=$(go list -f '{{if eq .Name "main"}}{{.ImportPath}}{{end}}' ./... | sed '/^$/d')
          if [ -z "$mains" ]; then
            echo "No main packages found; skipping TinyGo build."
            exit 0
          fi
          for pkg in $mains; do
            echo "tinygo build -target esp32-coreboard-v2 $pkg"
            tinygo build -target esp32-coreboard-v2 "$pkg"
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: golangci/golangci-lint-action@v6
